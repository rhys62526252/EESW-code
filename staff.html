<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Velindre Cancer Centre</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #2d6a4f;
      --green-mid:  #40916c;
      --green-light:#74c69d;
      --sage:       #d8f3dc;
      --cream:      #faf8f4;
      --charcoal:   #1e1e1e;
      --muted:      #6b7280;
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--charcoal); overflow-x: hidden; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 68px;
      background: rgba(255,255,255,0.93);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(45,106,79,0.12);
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-logo-mark {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--green); display: flex; align-items: center; justify-content: center;
      color: white; font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700;
    }
    .nav-logo span { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--green); font-weight: 500; line-height: 1.25; }
    .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--charcoal); font-size: 14px; transition: color 0.2s; }
    .nav-links a:hover { color: var(--green); }
    .nav-btn { background: var(--green); color: white !important; padding: 10px 22px; border-radius: 4px; font-weight: 700 !important; }
    .nav-btn:hover { background: var(--green-mid) !important; }

    /* HERO */
    .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; padding-top: 68px; }
    .hero-left {
      background: var(--green); display: flex; flex-direction: column; justify-content: center;
      padding: 80px 64px; position: relative; overflow: hidden;
    }
    .hero-left::before {
      content:''; position: absolute; width: 400px; height: 400px; border-radius: 50%;
      background: rgba(255,255,255,0.04); bottom: -100px; left: -80px;
    }
    .hero-left::after {
      content:''; position: absolute; width: 220px; height: 220px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1); top: 60px; right: -60px;
    }
    .hero-tag {
      font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--green-light); margin-bottom: 22px;
      animation: fadeUp 0.7s ease both;
    }
    .hero-h1 {
      font-family: 'Playfair Display', serif; font-size: clamp(34px, 4vw, 56px);
      line-height: 1.15; color: white; margin-bottom: 26px;
      animation: fadeUp 0.7s 0.1s ease both;
    }
    .hero-h1 em { font-style: italic; color: var(--green-light); }
    .hero-sub {
      font-size: 16px; line-height: 1.8; color: rgba(255,255,255,0.72); max-width: 440px;
      margin-bottom: 44px; font-weight: 300; animation: fadeUp 0.7s 0.2s ease both;
    }
    .hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; animation: fadeUp 0.7s 0.3s ease both; }

    .btn {
      padding: 14px 28px; border-radius: 4px; font-family: 'Lato', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 0.04em;
      text-decoration: none; cursor: pointer; border: none; transition: all 0.2s; display: inline-block;
    }
    .btn-white { background: white; color: var(--green); }
    .btn-white:hover { background: var(--sage); }
    .btn-outline { background: transparent; color: white; border: 1.5px solid rgba(255,255,255,0.45); }
    .btn-outline:hover { border-color: white; background: rgba(255,255,255,0.08); }
    .btn-green { background: var(--green); color: white; }
    .btn-green:hover { background: var(--green-mid); }

    .hero-right {
      background: var(--sage); position: relative; display: flex;
      align-items: center; justify-content: center; overflow: hidden;
    }
    .hero-right svg.bg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none;
    }
    .hero-stats {
      position: relative; z-index: 2; display: grid; grid-template-columns: 1fr 1fr;
      gap: 2px; width: 100%; max-width: 400px; border-radius: 8px; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.1); animation: fadeUp 0.8s 0.4s ease both;
    }
    .stat-card { background: white; padding: 36px 28px; text-align: center; }
    .stat-card.dark { background: var(--green); }
    .stat-card.mid  { background: var(--green-mid); }
    .stat-card.tint { background: #f0faf4; }
    .stat-num {
      font-family: 'Playfair Display', serif; font-size: 40px;
      font-weight: 700; color: var(--green); line-height: 1; margin-bottom: 8px;
    }
    .stat-card.dark .stat-num,
    .stat-card.mid  .stat-num { color: white; }
    .stat-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .stat-card.dark .stat-label,
    .stat-card.mid  .stat-label { color: rgba(255,255,255,0.7); }

    /* SERVICES */
    .section { padding: 96px 48px; max-width: 1200px; margin: 0 auto; }
    .section-tag { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--green-mid); margin-bottom: 14px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: clamp(26px, 3vw, 40px); line-height: 1.2; color: var(--charcoal); margin-bottom: 16px; }
    .section-sub { font-size: 16px; line-height: 1.75; color: var(--muted); font-weight: 300; max-width: 560px; margin-bottom: 52px; }

    .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
    .service-card {
      background: white; border-radius: 8px; padding: 34px 28px;
      border: 1px solid rgba(0,0,0,0.06);
      transition: transform 0.25s, box-shadow 0.25s; cursor: default;
    }
    .service-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(45,106,79,0.1); }
    .service-icon { font-size: 28px; margin-bottom: 18px; }
    .service-card h3 { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 11px; color: var(--charcoal); }
    .service-card p { font-size: 14px; line-height: 1.75; color: var(--muted); font-weight: 300; }

    /* BANNER */
    .banner {
      background: var(--green); padding: 72px 64px;
      display: flex; align-items: center; justify-content: space-between; gap: 48px;
    }
    .banner h2 { font-family: 'Playfair Display', serif; font-size: clamp(22px, 2.8vw, 34px); color: white; margin-bottom: 14px; }
    .banner p { font-size: 15px; color: rgba(255,255,255,0.72); line-height: 1.8; max-width: 560px; font-weight: 300; }

    /* INFO STRIP */
    .info-strip { background: white; border-top: 1px solid rgba(0,0,0,0.06); border-bottom: 1px solid rgba(0,0,0,0.06); display: grid; grid-template-columns: repeat(3, 1fr); }
    .info-item { display: flex; align-items: flex-start; gap: 16px; padding: 40px 48px; border-right: 1px solid rgba(0,0,0,0.06); }
    .info-item:last-child { border-right: none; }
    .info-icon { font-size: 22px; margin-top: 2px; }
    .info-item h4 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .info-item p, .info-item a { font-size: 14px; color: var(--muted); font-weight: 300; line-height: 1.65; text-decoration: none; }
    .info-item a { color: var(--green-mid); }
    .info-item a:hover { text-decoration: underline; }

    /* FOOTER */
    footer {
      background: var(--charcoal); color: rgba(255,255,255,0.45); padding: 36px 48px;
      display: flex; align-items: center; justify-content: space-between; font-size: 13px; font-weight: 300;
    }
    footer span { color: rgba(255,255,255,0.75); }
    .footer-links { display: flex; gap: 28px; }
    .footer-links a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 13px; transition: color 0.2s; }
    .footer-links a:hover { color: var(--green-light); }

    /* ANIMATION */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; }
      .hero-right { min-height: 360px; }
      .services-grid { grid-template-columns: 1fr 1fr; }
      nav { padding: 0 24px; }
      .nav-links { display: none; }
      .banner { flex-direction: column; align-items: flex-start; padding: 48px 28px; }
      .info-strip { grid-template-columns: 1fr; }
      .info-item { border-right: none; border-bottom: 1px solid rgba(0,0,0,0.06); }
      footer { flex-direction: column; gap: 18px; text-align: center; }
      .section { padding: 64px 24px; }
    }
    @media (max-width: 580px) {
      .services-grid { grid-template-columns: 1fr; }
      .hero-left { padding: 52px 28px; }
      .hero-stats { max-width: 90vw; }
    }
  </style>
</head>
<nav>
  <a class="nav-logo" href="./home.html">
    <div class="nav-logo-mark">V</div>
    <span>Velindre<br/>Cancer Centre</span>
  </a>
  <ul class="nav-links">
    <li><a href="#services">Services</a></li>
    <li><a href="#new-centre">New Centre</a></li>
    <li><a href="#contact">Contact</a></li>
    <li><a href="./staff.html" class="nav-btn">Staff Portal</a></li>
  </ul>
</nav>
<body>
<section class="hero">
  <div class="hero-left">
    <p class="hero-tag">Velindre University NHS Trust &middot; Cardiff, Wales</p>
    <h1 class="hero-h1">Staff Portal<br/><em>Log In</em></h1>
    </div>
  </div>
<div class="hero-right">
    <svg class="bg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <circle cx="520" cy="80"  r="220" fill="rgba(45,106,79,0.06)"/>
      <circle cx="80"  cy="520" r="280" fill="rgba(45,106,79,0.04)"/>
      <circle cx="300" cy="300" r="130" fill="rgba(116,198,157,0.07)"/>
      <line x1="0" y1="600" x2="600" y2="0" stroke="rgba(45,106,79,0.06)" stroke-width="1"/>
    </svg>
    <form action="/login-handler" method="POST">
        <div>
            <label for="username">Username:</label>
            <input id="username" name="username" type="text" class="u-border-2 u-border-grey-10 u-grey-10 u-input u-input-rectangle u-input-1" required="">
        </div>
        <br>
        <div>
            <label for="password">Password:</label>
            <!-- type="password" masks characters for security -->
            <input type="password" id="password" name="password" required>
        </div>
        <br>
          <button type="button", id="loginBtn">Login</button>
</form>
<p id="message"></p>
</div>
</section>
<script>
        // Get the login button element
        const loginBtn = document.getElementById('loginBtn');
        
        // Add click event listener to the button
        loginBtn.addEventListener('click', function() {
            // Get input values
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Simple validation
            if (username === '' || password === '') {
                showMessage('Please fill in all fields', 'red');
                return;
            }
            
            // Check credentials (example with hardcoded values)
            if ((username === 'smitchell') && password === 'password1') {
                showMessage('Login successful!', 'green');
                // You can redirect to another page here
                  window.location.href = 'database.html';
            } 
            else if ((username === 'jcarter') && password === 'password2') {
                showMessage('Login successful!', 'green');
                // You can redirect to another page here
                  window.location.href = 'database.html';
            }
            else if ((username === 'ebrown') && password === 'password3') {
                showMessage('Login successful!', 'green');
                // You can redirect to another page here
                  window.location.href = 'database.html';
            }
            else {
                showMessage('Invalid username or password', 'red');
            }
        });
        
        // Function to display messages
        function showMessage(text, color) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.style.color = color;
        }
    </script>
</body>
